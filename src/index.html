<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Schedule</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-inline';">
</head>
<body>
    <div class="app-container">
        <div class="top-controls drag-area" data-tauri-drag-region>
            <div class="left-actions no-drag" style="margin-right: auto; position: relative;">
                <button class="btn-icon mini-btn" id="btnSettings" title="Settings">
                    <span class="material-symbols-rounded">settings</span>
                </button>
                <button class="btn-icon mini-btn" id="btnLog" title="Diary"><span class="material-symbols-rounded">history</span></button>
                <button class="btn-icon mini-btn" id="btnGoogleLogin" title="Sync">
                    <span class="material-symbols-rounded" id="syncIcon">cloud_off</span>
                </button>
                <div class="settings-dropdown" id="settingsMenu">
                    <div class="setting-item">
                        <label>Opacity</label>
                        <input type="range" class="settings-slider" id="opacitySlider" min="0.1" max="1" step="0.05" value="0.7">
                    </div>
                    <div class="setting-item">
                        <label>Default Resolution</label>
                        <input type="text" class="form-control res-input" id="resInput" placeholder="1024 x 600">
                    </div>
                    <button class="btn btn-save active" id="btnApplySettings" style="width: 100%;">Apply</button>
                </div>
            </div>
            <div class="right-actions no-drag">
                <button class="btn-icon mini-btn" id="btnMinimize"><span class="material-symbols-rounded">remove</span></button>
                <button class="btn-icon mini-btn" id="btnClose"><span class="material-symbols-rounded">close</span></button>
            </div>
        </div>

        <div class="calendar-wrapper">
            <div class="calendar-header" id="calHeader">
                <div class="time-axis-head no-drag">
                    <button class="btn-icon add-task-grid-btn" id="btnAdd" title="Add Task"><span class="material-symbols-rounded">add</span></button>
                </div>
            </div>
            <div class="calendar-body" id="calBody"></div>
        </div>

        <div class="upcoming-wrapper">
            <div class="upcoming-title">Upcoming</div>
            <div class="upcoming-scroll-area">
                <div class="upcoming-list" id="upcomingList"></div>
                <div class="scroll-gradient"></div>
                <button class="btn-icon scroll-arrow" id="btnScrollRight"><span class="material-symbols-rounded">chevron_right</span></button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="taskModal">
        <div class="modal-content">
            <div class="form-group">
                <input type="text" class="form-control title-input" id="taskTitle" placeholder="Task Name">
            </div>
            <div class="form-group row-flex">
                <select class="form-control" id="taskType"></select>
                <button class="btn-icon" id="btnEditType" title="Manage Types"><span class="material-symbols-rounded">format_paint</span></button>
            </div>
            <div class="form-group">
                <div class="day-selector" id="daySelector"></div>
            </div>
            <div class="form-group row-flex gap-md">
                <div class="time-input-group">
                    <label class="modal-time-label start">Start</label>
                    <input type="time" class="form-control" id="taskStart">
                </div>
                <div class="time-input-group">
                    <label class="modal-time-label end">End</label>
                    <input type="time" class="form-control" id="taskEnd">
                </div>
            </div>
            <div class="form-group">
                <input type="text" class="form-control" id="taskLocation" placeholder="Location">
            </div>
            <div class="form-group">
                <textarea class="form-control" id="taskNote" rows="2" placeholder="Note"></textarea>
            </div>
            <div class="modal-actions">
                <button class="btn btn-erase" id="btnEraseTask" style="display: none;">Erase</button>
                <button class="btn btn-finish" id="btnFinishTask" style="display: none;">Finish</button>
                
                <button class="btn btn-cancel" id="btnCancelTask" title="Cancel">
                    <span class="material-symbols-rounded">undo</span>
                </button>
                <button class="btn btn-save" id="btnSaveTask" title="Save">
                    <span class="material-symbols-rounded">check</span>
                </button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="upcomingModal">
        <div class="modal-content md">
            <div class="form-group"><input type="text" class="form-control title-input" id="upTitle" placeholder="Upcoming Task"></div>
            <div class="form-group"><label>Deadline</label><input type="datetime-local" class="form-control" id="upDate"></div>
            <div class="form-group"><label>Type</label><select class="form-control" id="upType"></select></div>
            <div class="form-group"><textarea class="form-control" id="upNote" placeholder="Notes..." rows="2"></textarea></div>
            <div class="modal-actions">
                <button class="btn btn-erase" id="btnEraseUp" style="display: none;">Erase</button>
                <button class="btn btn-finish" id="btnFinishUp" style="display: none;">Finish</button>
                
                <button class="btn btn-cancel" id="btnCancelUp" title="Cancel">
                    <span class="material-symbols-rounded">undo</span>
                </button>
                <button class="btn btn-save active" id="btnSaveUp" title="Save">
                    <span class="material-symbols-rounded">check</span>
                </button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="typeModal">
        <div class="modal-content">
            <h3 class="modal-header">Manage Types</h3>
            <div class="form-group row-flex type-add-row">
                <input type="text" class="form-control type-input-borderless" id="newTypeName" placeholder="New Type Name">
                <button class="btn btn-save active btn-add-type" id="btnAddType">Add</button>
            </div>
            <hr class="divider">
            <div class="form-group row-flex">
                <select class="form-control" id="typeEditSelect"></select>
                <button class="btn-icon btn-delete-type" id="btnDeleteType" title="Delete this type"><span class="material-symbols-rounded">delete</span></button>
            </div>
            <div class="form-group">
                <label>Custom CSS</label>
                <textarea class="form-control code-textarea" id="typeCssInput" rows="5" placeholder="background: #e8f0fe;&#10;color: #1a73e8;"></textarea>
            </div>
            <div class="modal-actions">
                <button class="btn btn-cancel" id="btnCancelType">Close</button>
                <button class="btn btn-save active" id="btnSaveType">Apply CSS</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay z-high" id="confirmEraseModal">
        <div class="modal-content sm">
            <h3 class="modal-title">Erase Task?</h3>
            <p class="modal-desc">This will completely remove the task from your schedule.</p>
            <div class="checkbox-group">
                <label class="checkbox-label">
                    <input type="checkbox" id="chkDeleteInDiary">
                    Delete all history in Diary as well
                </label>
            </div>
            <div class="modal-actions center">
                <button class="btn btn-cancel" id="btnCancelEraseConfirm">Cancel</button>
                <button class="btn btn-erase" id="btnDoErase">Erase</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay z-high" id="confirmFinishModal">
        <div class="modal-content sm">
            <h3 class="modal-title success">End Task?</h3>
            <p class="modal-desc mb-lg">End this task today?</p>
            <div class="modal-actions center">
                <button class="btn btn-cancel" id="btnCancelFinishConfirm">Cancel</button>
                <button class="btn btn-finish" id="btnDoFinish">Confirm</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="logModal">
        <div class="modal-content lg">
            <h3 class="modal-header bordered">Activity Logs</h3>
            <div class="log-list log-scroll-area" id="logList"></div>
            <div class="modal-actions mt-md">
                <button class="btn btn-cancel" id="btnCancelLog">Close</button>
            </div>
        </div>
    </div>

    <script type="module" src="script/main.js"></script>
</body>
</html>
